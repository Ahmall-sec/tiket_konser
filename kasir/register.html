<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Booking Tiket Konser</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <h2>🎤 Booking Tiket Konser</h2>

    <div class="container">
      <form id="ticketForm" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="name" class="form-label">Nama</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Nama"
            required
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Email"
            required
          />
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Nomor Telepon</label>
          <input
            type="tel"
            id="phone"
            class="form-control"
            placeholder="Nomor Telepon"
            required
          />
        </div>

        <div class="mb-3">
          <label for="ticket" class="form-label">Jumlah Tiket</label>
          <input
            type="number"
            id="ticket"
            class="form-control"
            value="1"
            min="1"
            max="1"
            readonly
            required
          />
          <small class="text-muted"
            >Satu akun hanya untuk satu tiket (1 wajah).</small
          >
        </div>

        <div class="mb-3">
          <label for="ticketCategory" class="form-label">Kategori Tiket</label>
          <select
            id="ticketCategory"
            class="form-select form-select-sm"
            required
          >
            <option value="VIP">VIP</option>
            <option value="Regular">Regular</option>
            <option value="Economy">Economy</option>
          </select>
        </div>

        <h3>🔍 Verifikasi Wajah</h3>
        <video id="video" autoplay playsinline width="300"></video>
        <canvas id="canvas" hidden></canvas>
        <p id="status">Klik mulai untuk scan wajah</p>

        <div id="progressBar">
          <div id="progress"></div>
        </div>

        <p id="notif">✅ Scan wajah berhasil! Silakan lanjut</p>
        <button type="button" class="btn btn-success" onclick="startScan()">
          Mulai Scan</button
        ><br /><br />

        <button
          type="button"
          id="submitBtn"
          class="btn btn-primary"
          onclick="submitData()"
          disabled
        >
          Pesan Tiket
        </button>

        <h3 id="result"></h3>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
