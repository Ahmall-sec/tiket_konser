<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Gate Verifikasi Tiket</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
      }
      #video {
        border-radius: 10px;
        border: 3px solid #ccc;
      }
      .success {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h2>🎫 Gate Verifikasi Tiket</h2>

    <p id="status">Klik tombol untuk mulai scan wajah di pintu masuk</p>

    <video id="video" autoplay playsinline width="400"></video>
    <canvas id="canvas" hidden></canvas>

    <br /><br />
    <button onclick="startScan()" style="padding: 10px 20px; cursor: pointer">
      Mulai Verifikasi
    </button>

    <div id="resultContainer" style="margin-top: 20px">
      <h3 id="resultTitle"></h3>
    </div>

    <script src="verif.js"></script>
  </body>
</html>
